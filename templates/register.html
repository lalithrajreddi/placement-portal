{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4 mb-4">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">Register</h3>
                <form method="POST" action="{{ url_for('register') }}">
                    <div class="mb-3">
                        <label class="form-label">Register As</label>
                        <select name="role" id="roleSelect" class="form-select" onchange="toggleFields()" required>
                            <option value="">-- Select Role --</option>
                            <option value="student">Student</option>
                            <option value="company">Company</option>
                        </select>
                    </div>

                    <!-- Common fields -->
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <!-- Student Specific -->
                    <div id="studentFields" style="display: none;">
                        <h5 class="mt-4 border-bottom pb-2">Student Details</h5>
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="full_name" class="form-control" id="fullNameInput">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Degree (e.g., B.Tech CS)</label>
                            <input type="text" name="degree" class="form-control" id="degreeInput">
                        </div>
                    </div>

                    <!-- Company Specific -->
                    <div id="companyFields" style="display: none;">
                        <h5 class="mt-4 border-bottom pb-2">Company Details</h5>
                        <div class="mb-3">
                            <label class="form-label">Company Name</label>
                            <input type="text" name="company_name" class="form-control" id="companyNameInput">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">HR Contact Email / Phone</label>
                            <input type="text" name="hr_contact" class="form-control" id="hrContactInput">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Website (Optional)</label>
                            <input type="url" name="website" class="form-control">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mt-4">Register</button>
                    <div class="mt-3 text-center">
                        Already have an account? <a href="{{ url_for('login') }}">Login here</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
function toggleFields() {
    const role = document.getElementById('roleSelect').value;
    const studentF = document.getElementById('studentFields');
    const companyF = document.getElementById('companyFields');
    
    // reset requirements
    document.getElementById('fullNameInput').required = false;
    document.getElementById('degreeInput').required = false;
    document.getElementById('companyNameInput').required = false;
    document.getElementById('hrContactInput').required = false;

    if (role === 'student') {
        studentF.style.display = 'block';
        companyF.style.display = 'none';
        document.getElementById('fullNameInput').required = true;
        document.getElementById('degreeInput').required = true;
    } else if (role === 'company') {
        studentF.style.display = 'none';
        companyF.style.display = 'block';
        document.getElementById('companyNameInput').required = true;
        document.getElementById('hrContactInput').required = true;
    } else {
        studentF.style.display = 'none';
        companyF.style.display = 'none';
    }
}
</script>
{% endblock %}
